<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PDF Search</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f7f6f2;
    min-height: 100vh;
    color: #1c1b18;
  }

  header {
    background: #1c1b18;
    padding: 1.5rem 1rem 1.25rem;
    text-align: center;
  }

  header h1 {
    color: #fff;
    font-size: clamp(18px, 5vw, 26px);
    font-weight: 600;
    letter-spacing: -0.4px;
    margin-bottom: 4px;
  }

  header p {
    color: #888;
    font-size: clamp(12px, 3vw, 14px);
  }

  .search-wrap {
    background: #1c1b18;
    padding: 0 1rem 1.5rem;
    display: flex;
    justify-content: center;
  }

  .search-bar {
    display: flex;
    width: 100%;
    max-width: 620px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .search-bar input {
    flex: 1;
    font-size: clamp(14px, 4vw, 16px);
    padding: 13px 14px;
    border: none;
    outline: none;
    background: #fff;
    color: #1c1b18;
    min-width: 0; /* prevents overflow on small screens */
  }

  .search-bar input::placeholder { color: #aaa; }

  .search-bar button {
    padding: 13px 18px;
    background: #e8a020;
    border: none;
    color: #fff;
    font-size: clamp(13px, 3.5vw, 15px);
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .search-bar button:hover { background: #cf8c18; }
  .search-bar button:active { background: #b87a14; }

  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 1.25rem 0.9rem;
  }

  #loading {
    text-align: center;
    padding: 3rem 0;
    display: none;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #e0ddd6;
    border-top-color: #e8a020;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: #888; font-size: 14px; }

  #status {
    font-size: clamp(12px, 3vw, 14px);
    color: #888;
    margin-bottom: 1rem;
    min-height: 20px;
  }
  #status b { color: #1c1b18; }

  .result {
    background: #fff;
    border: 1px solid #e5e2da;
    border-radius: 12px;
    padding: 0.9rem 1rem;
    margin-bottom: 10px;
    transition: box-shadow 0.15s;
  }

  .result:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .result:active { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

  .result-top {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .pdf-icon {
    width: 34px; height: 34px;
    min-width: 34px;
    background: #fef0d8;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
  }

  .result-meta {
    flex: 1;
    min-width: 0; /* allows text to truncate/wrap */
  }

  .filename {
    font-size: clamp(13px, 3.5vw, 15px);
    font-weight: 600;
    color: #1c1b18;
    word-break: break-word;
    line-height: 1.3;
  }

  .page-badge {
    display: inline-block;
    margin-top: 4px;
    background: #e8f0fe;
    color: #1a56db;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 99px;
    white-space: nowrap;
  }

  .snippet {
    font-size: clamp(12px, 3vw, 13px);
    color: #666;
    line-height: 1.6;
    border-top: 1px solid #f0ede8;
    padding-top: 8px;
    margin-top: 8px;
    word-break: break-word;
  }

  mark {
    background: #fff3b0;
    color: #7a5500;
    padding: 1px 2px;
    border-radius: 3px;
    font-weight: 600;
  }

  .empty {
    text-align: center;
    padding: 3rem 0;
    color: #999;
  }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: clamp(13px, 3.5vw, 15px); }
  .empty small { font-size: 12px; color: #bbb; }

  .setup-notice {
    background: #fff8ec;
    border: 1px solid #f0d080;
    border-radius: 12px;
    padding: 1.1rem 1.25rem;
    color: #7a5500;
    font-size: clamp(12px, 3vw, 14px);
    line-height: 1.7;
  }
  .setup-notice h2 { font-size: 15px; margin-bottom: 6px; }
  .setup-notice code {
    font-family: monospace;
    background: #fef3d0;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    word-break: break-all;
  }

  /* Tablet and up */
  @media (min-width: 480px) {
    .container { padding: 1.5rem 1.25rem; }
    .result { padding: 1.1rem 1.25rem; }
    header { padding: 2rem 1.5rem 1.5rem; }
    .search-wrap { padding: 0 1.5rem 2rem; }

    .result-top { align-items: center; }

    .result-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filename { flex: 1; }

    .page-badge {
      margin-top: 0;
      flex-shrink: 0;
    }
  }
</style>
</head>
<body>

<header>
  <h1>📄 PDF Search</h1>
  <p>Type a name — find which PDF it's in</p>
</header>

<div class="search-wrap">
  <div class="search-bar">
    <input type="text" id="searchInput"
      placeholder="Type a name..."
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    />
    <button onclick="doSearch()">Search</button>
  </div>
</div>

<div class="container">
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading index...</p>
  </div>
  <div id="status"></div>
  <div id="results"></div>
</div>

<script>
const INDEX_URL = "index.json";
let pdfData = null;

document.getElementById("searchInput").addEventListener("keydown", e => {
  if (e.key === "Enter") doSearch();
});

window.addEventListener("load", () => loadIndex());

async function loadIndex() {
  if (pdfData) return true;
  document.getElementById("loading").style.display = "block";
  try {
    const res = await fetch(INDEX_URL);
    if (!res.ok) throw new Error("not found");
    pdfData = await res.json();
    document.getElementById("loading").style.display = "none";
    document.getElementById("status").innerHTML =
      `Index loaded — <b>${pdfData.length}</b> PDFs ready to search.`;
    return true;
  } catch {
    document.getElementById("loading").style.display = "none";
    document.getElementById("results").innerHTML = `
      <div class="setup-notice">
        <h2>⚙️ Setup needed</h2>
        <p>Could not load <code>index.json</code>. Follow these steps:</p>
        <ol style="margin: 10px 0 0 18px; line-height: 2;">
          <li>Install pypdf: <code>pip install pypdf</code></li>
          <li>Run: <code>python build_index.py</code> in your PDF folder</li>
          <li>Upload <code>index.json</code> + <code>index.html</code> to your GitHub repo</li>
          <li>Enable GitHub Pages on that repo</li>
        </ol>
      </div>`;
    return false;
  }
}

function escapeRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function getSnippet(text, query) {
  const lower = text.toLowerCase();
  const idx = lower.indexOf(query.toLowerCase());
  if (idx === -1) return null;
  const start = Math.max(0, idx - 60);
  const end = Math.min(text.length, idx + query.length + 60);
  let snip = text.slice(start, end).replace(/\s+/g, " ").trim();
  if (start > 0) snip = "…" + snip;
  if (end < text.length) snip += "…";
  const re = new RegExp("(" + escapeRe(query) + ")", "gi");
  return snip.replace(re, "<mark>$1</mark>");
}

function matchesAllWords(text, query) {
  const lower = text.toLowerCase();
  return query.toLowerCase().trim().split(/\s+/).every(w => lower.includes(w));
}

async function doSearch() {
  const query = document.getElementById("searchInput").value.trim();
  if (!query) return;

  const ok = await loadIndex();
  if (!ok) return;

  const results = [];

  for (const entry of pdfData) {
    const pages = entry.pages || [entry.text || ""];

    pages.forEach((pageText, pageIndex) => {
      if (matchesAllWords(pageText, query)) {
        results.push({
          file: entry.file,
          pageNum: pageIndex + 1,
          totalPages: pages.length,
          snippet: getSnippet(pageText, query)
        });
      }
    });
  }

  const statusEl = document.getElementById("status");
  const resultsEl = document.getElementById("results");

  if (!results.length) {
    statusEl.innerHTML = `No results for "<b>${query}</b>" across ${pdfData.length} files.`;
    resultsEl.innerHTML = `
      <div class="empty">
        <div class="icon">🔍</div>
        <p>No PDF contains "<b>${query}</b>"</p>
        <small>Try a different spelling or partial name</small>
      </div>`;
    return;
  }

  statusEl.innerHTML =
    `Found "<b>${query}</b>" in <b>${results.length}</b> entr${results.length > 1 ? "ies" : "y"}`;
  resultsEl.innerHTML = "";

  for (const r of results) {
    const card = document.createElement("div");
    card.className = "result";
    card.innerHTML = `
      <div class="result-top">
        <div class="pdf-icon">📄</div>
        <div class="result-meta">
          <div class="filename">${r.file}</div>
          <div class="page-badge">Page ${r.pageNum} of ${r.totalPages}</div>
        </div>
      </div>
      ${r.snippet ? `<div class="snippet">${r.snippet}</div>` : ""}
    `;
    resultsEl.appendChild(card);
  }
}
</script>
</body>
</html>
